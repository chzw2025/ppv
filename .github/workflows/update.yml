name: Update PPV M3U

on:
  schedule:
    # 每小时的 17 分和 47 分自动执行
    - cron: "17,47 * * * *"
  workflow_dispatch: # 允许手动点击运行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装必要依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行转换脚本
        run: python a.py

      - name: 同步生成备份文件
        run: |
          cp PPV_IFRAME.m3u8 example.m3u8

      - name: 提交并推送到仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add PPV_IFRAME.m3u8 example.m3u8
          # 只有在文件内容确实有变化时才提交，防止 Action 报错
          if git diff --staged --quiet; then
            echo "没有检测到内容变化，跳过提交。"
          else
            git commit -m "自动更新: 提取 ID 并替换为 abc.com 链接 ($(date +'%Y-%m-%d %H:%M'))"
            git push
          fi
