name: Update PPV M3U

on:
  schedule:
    # 每小时的 17 分和 47 分自动执行
    - cron: "17,47 * * * *"
  workflow_dispatch: # 允许手动点击运行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装必要依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行转换脚本
        # 这一步运行完，a.py 会自动生成两个正确的文件
        run: python a.py

      - name: 提交并推送到仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 同时添加两个生成好的文件
          git add PPV_IFRAME.m3u8 example.m3u8
          
          if git diff --staged --quiet; then
            echo "没有检测到内容变化，跳过提交。"
          else
            git commit -m "自动更新: 分别生成替换版和原始版 ($(date +'%Y-%m-%d %H:%M'))"
            git push
          fi
